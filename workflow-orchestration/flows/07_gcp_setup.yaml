id: 07_gcp_setup
namespace: gcp_service_setup

tasks:
  - id: create_gcs_bucket
    type: io.kestra.plugin.gcp.gcs.CreateBucket
    ifExists: SKIP
    storageClass: REGIONAL
    name: "{{kv('GCP_BUCKET_NAME','gcp_setup')}}" # make sure it's globally unique!

  - id: create_bq_dataset
    type: io.kestra.plugin.gcp.bigquery.CreateDataset
    name: "{{kv('GCP_DATASET', 'gcp_setup')}}"
    ifExists: SKIP

pluginDefaults:
  - type: io.kestra.plugin.gcp
    values:
      projectId: "{{kv('GCP_PROJECT_ID','gcp_setup')}}"
      location: "{{kv('GCP_LOCATION','gcp_setup')}}"
      bucket: "{{kv('GCP_BUCKET_NAME','gcp_setup')}}"